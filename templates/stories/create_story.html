{% extends 'base.html' %}

{% block content %}
<div class="chat-wrapper">
    <div class="chat-card p-4">
        <h3 class="fw-bold mb-3">Add Story</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Story Image</label>
                <input type="file" name="image" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Caption</label>
                <input type="text" name="caption" class="form-control" placeholder="Write a caption...">
            </div>

            <button class="btn btn-primary w-100">Upload Story</button>
        </form>
    </div>
</div>
{% endblock %}
