{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card post-card p-4">
            <h3 class="fw-bold mb-3">Edit Post</h3>

            {% if post.image %}
                <img src="{{ post.image.url }}" class="post-img mb-3">
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-primary w-100 rounded-pill">
                    Save Changes
                </button>

                <a href="{% url 'profile' %}" class="btn btn-outline-dark w-100 rounded-pill mt-2">
                    Cancel
                </a>
            </form>
        </div>

    </div>
</div>
{% endblock %}
