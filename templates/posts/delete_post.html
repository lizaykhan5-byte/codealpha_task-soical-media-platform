{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card post-card p-4 text-center">
            <h3 class="fw-bold text-danger mb-3">Delete Post?</h3>
            <p>Are you sure you want to delete this post?</p>

            <div class="border rounded p-3 mb-3 text-start">
                <p class="mb-0">{{ post.caption }}</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100 rounded-pill">
                    Yes, Delete
                </button>

                <a href="{% url 'profile' %}" class="btn btn-outline-dark w-100 rounded-pill mt-2">
                    Cancel
                </a>
            </form>
        </div>

    </div>
</div>
{% endblock %}
