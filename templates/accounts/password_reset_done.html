{% extends "base.html" %}

{% block content %}
<div class="error-page">
    <div class="error-card">
        <div class="error-code">✓</div>

        <h1>Email Sent</h1>

        <p>
            If an account exists with that email address, a password reset link
            has been sent. Please check your inbox and spam folder.
        </p>

        <a href="{% url 'login' %}" class="error-btn">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
